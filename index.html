  <body class="light">
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("processseed-theme");
          var parsedTheme = storedTheme ? JSON.parse(storedTheme) : "light";
          var theme = parsedTheme === "dark" ? "dark" : "light";
          document.body.classList.remove("light", "dark");
          document.body.classList.add(theme);
        } catch (error) {
          document.body.classList.remove("dark");
          document.body.classList.add("light");
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
